
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: authsystem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=authsystem;Username=postgres;Password=postgres
      - JwtSettings__Issuer=AuthSystem
      - JwtSettings__Audience=AuthSystemUsers
      - JwtSettings__Secret=${JWT_SECRET:-your-production-secret-key-min-32-chars}
      - JwtSettings__ExpirationMinutes=60
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
